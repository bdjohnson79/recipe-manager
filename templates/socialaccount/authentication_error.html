{% extends "recipes/base.html" %}

{% block title %}Login Error{% endblock %}

{% block content %}
<div style="max-width:400px;margin:2rem auto;text-align:center">
  <h1>Login Error</h1>
  <div class="card" style="margin-top:1rem">

  </div>
</div>
{% endblock %}
