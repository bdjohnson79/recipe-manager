{% extends "recipes/base.html" %}

{% block title %}Delete {{ recipe.title }}{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;margin:2rem auto;text-align:center">
  <h1 style="margin-bottom:1rem">Delete Recipe</h1>
  <p>Are you sure you want to delete <strong>{{ recipe.title }}</strong>?</p>
  <p style="color:#dc3545;margin-top:0.5rem">This action cannot be undone.</p>
  <form method="post" style="margin-top:1.5rem">
    {% csrf_token %}
    <div class="actions" style="justify-content:center">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{{ recipe.get_absolute_url }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
