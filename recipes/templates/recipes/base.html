<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Recipe Manager{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8f9fa; color: #212529; line-height: 1.6; }
    a { color: #0d6efd; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { background: #343a40; padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
    nav a { color: #f8f9fa; font-weight: 500; }
    nav .brand { font-size: 1.25rem; font-weight: 700; }
    .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
    .btn { display: inline-block; padding: 0.5rem 1rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.95rem; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-danger { background: #dc3545; color: #fff; }
    .btn:hover { opacity: 0.9; text-decoration: none; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li { padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 0.5rem; }
    .messages .success { background: #d1e7dd; color: #0f5132; }
    .messages .error { background: #f8d7da; color: #842029; }
    .card { background: #fff; border: 1px solid #dee2e6; border-radius: 6px; padding: 1.25rem; margin-bottom: 1rem; }
    .badge { display: inline-block; padding: 0.2em 0.6em; border-radius: 3px; font-size: 0.8em; background: #e9ecef; }
    .badge-easy { background: #d1e7dd; color: #0f5132; }
    .badge-medium { background: #fff3cd; color: #664d03; }
    .badge-hard { background: #f8d7da; color: #842029; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
    input[type=text], input[type=number], input[type=file], select, textarea {
      width: 100%; padding: 0.45rem 0.75rem; border: 1px solid #ced4da;
      border-radius: 4px; font-size: 0.95rem; font-family: inherit;
    }
    .form-group { margin-bottom: 1rem; }
    .formset-row { border: 1px solid #dee2e6; border-radius: 4px; padding: 0.75rem; margin-bottom: 0.75rem; position: relative; }
    .formset-row .delete-row { position: absolute; top: 0.5rem; right: 0.75rem; color: #dc3545; cursor: pointer; font-size: 0.85rem; }
    .inline-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
    .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
    .recipe-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; margin-bottom: 0.75rem; }
    .recipe-card h2 { font-size: 1.1rem; margin-bottom: 0.25rem; }
    .meta { color: #6c757d; font-size: 0.875rem; }
    .tag { background: #e9ecef; border-radius: 3px; padding: 0.15em 0.5em; font-size: 0.8em; margin-right: 0.25rem; }
    .search-bar { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-bar input, .search-bar select { flex: 1; min-width: 140px; }
    h1 { margin-bottom: 1rem; }
    h2 { margin-bottom: 0.5rem; }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .step { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .step-num { font-size: 1.5rem; font-weight: 700; color: #0d6efd; flex-shrink: 0; width: 2rem; }
    table { width: 100%; border-collapse: collapse; }
    td, th { padding: 0.5rem 0.75rem; border-bottom: 1px solid #dee2e6; text-align: left; }
    .pagination { display: flex; gap: 0.5rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .page-item a, .page-item span { padding: 0.4rem 0.75rem; border: 1px solid #dee2e6; border-radius: 4px; }
    .page-item.active span { background: #0d6efd; color: #fff; border-color: #0d6efd; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <a href="{% url 'recipes:list' %}" class="brand">Recipe Manager</a>
    <a href="{% url 'recipes:list' %}">Recipes</a>
    <a href="{% url 'recipes:create' %}">Add Recipe</a>
    <a href="/admin/" style="margin-left:auto">Admin</a>
  </nav>
  <div class="container">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
